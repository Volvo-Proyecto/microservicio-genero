server:
  port: 8081

spring:
  application:
    name: genero
  datasource:
    url: jdbc:mysql://localhost:3306/genero_db?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always